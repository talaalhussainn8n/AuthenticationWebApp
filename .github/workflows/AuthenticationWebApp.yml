name: Build AuthenticationWebApp

on: 
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
    
    - name: 'Checkout code'
      uses: actions/checkout@v4
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Authentication_UI/Authentication_UI.csproj

    - name: Build
      run: dotnet build Authentication_UI/Authentication_UI.csproj

    - name: Test
      run: dotnet test Authentication_UI/Authentication_UI.csproj


